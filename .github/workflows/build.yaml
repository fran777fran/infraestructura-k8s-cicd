name: Construir y publicar imágenes

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'

env:
  REGISTRY: ghcr.io
  OWNER: fran777fran

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        servicio: [backend, frontend]
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Iniciar sesión en ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar la imagen de ${{ matrix.servicio }}
        uses: docker/build-push-action@v6
        with:
          context: ./app/${{ matrix.servicio }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/inventario-${{ matrix.servicio }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/inventario-${{ matrix.servicio }}:${{ github.sha }}